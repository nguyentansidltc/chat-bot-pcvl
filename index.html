<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Đăng nhập</title>
<link rel="icon" href="favicon.png">
<style>
  body {
    font-family: "Segoe UI", "Roboto", sans-serif;
    background: linear-gradient(135deg, #0148a6, #000066);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }

  .card {
    background: rgba(255, 255, 255, 0.1);
    padding: 20px 25px;
    border-radius: 14px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    max-width: 340px;
  }

  .card img{
    height: 35px;
    border-radius: 10px;
    margin: 10px auto;   /* top 15 - bottom 15 - left/right auto */
  }

  /* ⭐ Thêm CSS để canh giữa logo QA.jpg và tạo khoảng cách 15px */
  .card img.qalogo {
    display: block;
    margin: 15px auto;   /* top 15 - bottom 15 - left/right auto */
  }

  h4 {
    margin: 8px 0;   /* trên 7px – dưới 7px */
    text-align: center;
  }

  h5 {
     margin: 7px 0;   /* trên 7px – dưới 7px */
    text-align: justify;
  }

  button {
    background: #00b7ff;
    border: none;
    border-radius: 8px;
    color: white;
    padding: 10px 22px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.3s;
    margin-top: 10px;
  }

  button:hover { background: #0198dd; }

  footer {
    position: absolute;
    bottom: 10px;
    font-size: 13px;
    opacity: 0.7;
    color: burlywood;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="evn_logo.jpg" alt="EVN logo"/>

    <h4>💡TRUYỀN THÔNG:</h4>
    <h5>⚡Sử dụng điện: an toàn, tiết kiệm, hiệu quả</h5>
    <h5>📅 Quy định về thời hạn thanh toán tiền điện</h5>
    <h5>📅 Thời hạn ngừng cấp điện do quá hạn thanh toán</h5>
    <h5>🧾 Áp dụng các mức thu phí đóng, cấp điện trở lại</h5>

    <!-- ⭐ Thêm class qalogo để áp dụng CSS căn giữa -->
    <img src="QA.jpg" class="qalogo" alt="Q&A logo"/>

    <button onclick="startChat()">🔹Cổng Hỏi/Đáp</button>
  </div>

  <footer>⭐Copyright © 2025</footer>

<script>
function startChat() {
  window.location.href = "pcvl.html";
}
</script>
</body>
</html>
